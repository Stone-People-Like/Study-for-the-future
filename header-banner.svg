<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="auto">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1">
        <animate attributeName="stop-color" values="#6366F1;#8B5CF6;#A78BFA;#6366F1" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6;#A78BFA;#6366F1;#8B5CF6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#C084FC">
        <animate attributeName="stop-color" values="#C084FC;#6366F1;#8B5CF6;#C084FC" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <style>
      @keyframes wave1 {
        0%   { d: path("M0,160 C200,300 400,20  600,160 C800,300 1000,20  1200,160 L1200,200 L0,200 Z"); }
        25%  { d: path("M0,160 C200,100 400,260 600,160 C800,60  1000,260 1200,160 L1200,200 L0,200 Z"); }
        50%  { d: path("M0,160 C200,40  400,300 600,160 C800,40  1000,300 1200,160 L1200,200 L0,200 Z"); }
        75%  { d: path("M0,160 C200,240 400,80  600,160 C800,260 1000,80  1200,160 L1200,200 L0,200 Z"); }
        100% { d: path("M0,160 C200,300 400,20  600,160 C800,300 1000,20  1200,160 L1200,200 L0,200 Z"); }
      }
      @keyframes wave2 {
        0%   { d: path("M0,180 C300,80  500,280 800,180 C1000,60  1100,280 1200,180 L1200,200 L0,200 Z"); }
        25%  { d: path("M0,180 C300,260 500,100 800,180 C1000,280 1100,80  1200,180 L1200,200 L0,200 Z"); }
        50%  { d: path("M0,180 C300,300 500,40  800,180 C1000,300 1100,40  1200,180 L1200,200 L0,200 Z"); }
        75%  { d: path("M0,180 C300,100 500,260 800,180 C1000,80  1100,280 1200,180 L1200,200 L0,200 Z"); }
        100% { d: path("M0,180 C300,80  500,280 800,180 C1000,60  1100,280 1200,180 L1200,200 L0,200 Z"); }
      }
      @keyframes wave3 {
        0%   { d: path("M0,190 C250,60  450,300 700,190 C950,80  1100,290 1200,190 L1200,200 L0,200 Z"); }
        33%  { d: path("M0,190 C250,290 450,80  700,190 C950,280 1100,70  1200,190 L1200,200 L0,200 Z"); }
        66%  { d: path("M0,190 C250,120 450,260 700,190 C950,100 1100,260 1200,190 L1200,200 L0,200 Z"); }
        100% { d: path("M0,190 C250,60  450,300 700,190 C950,80  1100,290 1200,190 L1200,200 L0,200 Z"); }
      }
      @keyframes shimmer {
        from { transform: translateX(-100%); }
        to   { transform: translateX(200%); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.85; }
        50%      { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-4px); }
      }

      .w1 { animation: wave1 3s ease-in-out infinite; }
      .w2 { animation: wave2 2.7s ease-in-out infinite; }
      .w3 { animation: wave3 3.3s ease-in-out infinite; }
      .shimmer-rect { animation: shimmer 3s ease-in-out infinite; }
      .title { animation: glow 2s ease-in-out infinite, float 3s ease-in-out infinite; }
    </style>

    <!-- 用于 shimmer 的 clipPath -->
    <clipPath id="banner-clip">
      <rect x="0" y="0" width="1200" height="200"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#grad)"/>

  <!-- 波浪层 3（最底层） -->
  <path class="w3" d="M0,190 C250,60 450,300 700,190 C950,80 1100,290 1200,190 L1200,200 L0,200 Z" fill="url(#grad)" opacity="0.35"/>

  <!-- 波浪层 2（中层） -->
  <path class="w2" d="M0,180 C300,80 500,280 800,180 C1000,60 1100,280 1200,180 L1200,200 L0,200 Z" fill="url(#grad)" opacity="0.55"/>

  <!-- 波浪层 1（顶层） -->
  <path class="w1" d="M0,160 C200,300 400,20 600,160 C800,300 1000,20 1200,160 L1200,200 L0,200 Z" fill="url(#grad)" opacity="0.75"/>

  <!-- 光泽扫过效果 -->
  <g clip-path="url(#banner-clip)">
    <rect class="shimmer-rect" x="-1200" y="0" width="1200" height="200" fill="url(#shimmer)"/>
  </g>

  <!-- 标题文字 -->
  <text class="title" x="600" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="white" letter-spacing="3">
    Study for the Future
  </text>
</svg>
